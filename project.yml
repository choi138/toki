name: Toki
options:
  bundleIdPrefix: com.toki
  deploymentTarget:
    macOS: "13.0"
packages:
  TokiRemote:
    path: .
targets:
  TokiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TokiTests
    dependencies:
      - target: Toki
        embed: false
      - package: TokiRemote
        product: TokiUsageCore
      - package: TokiRemote
        product: TokiUsageReaders
      - package: TokiRemote
        product: TokiSyncProtocol
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toki.TokiTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Toki.app/Contents/MacOS/Toki
        BUNDLE_LOADER: $(TEST_HOST)

  Toki:
    type: application
    platform: macOS
    sources:
      - path: Toki
    info:
      path: Toki/Info.plist
      properties:
        CFBundleName: Toki
        CFBundleDisplayName: Toki
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHighResolutionCapable: true
        LSUIElement: true
    dependencies:
      - package: TokiRemote
        product: TokiDurableStorage
      - package: TokiRemote
        product: TokiSyncProtocol
      - package: TokiRemote
        product: TokiUsageCore
      - package: TokiRemote
        product: TokiUsageReaders
      - sdk: libsqlite3.tbd
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toki.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        MARKETING_VERSION: "1.1.3"
        CURRENT_PROJECT_VERSION: "4"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
