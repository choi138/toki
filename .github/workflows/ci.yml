name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tooling (XcodeGen, SwiftLint, SwiftFormat)
        run: brew install xcodegen swiftlint swiftformat

      - name: SwiftFormat
        run: swiftformat . --lint

      - name: SwiftLint
        run: swiftlint lint --strict --quiet

      - name: Run protocol and Agent tests
        run: swift test

      - name: Build macOS Agent
        run: swift build -c release --product toki-agent

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project Toki.xcodeproj \
            -scheme Toki \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project Toki.xcodeproj \
            -scheme Toki \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify package lockfiles are unchanged
        run: >-
          git diff --exit-code --
          Package.resolved
          TokiHub/Package.resolved
          Toki.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

  remote-linux-agent:
    name: Linux Agent (Swift 5.9.2)
    runs-on: ubuntu-24.04
    container: swift:5.9.2-jammy
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SQLite development headers
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y libsqlite3-dev

      - name: Verify Swift version
        run: |
          swift --version
          swift --version | grep -q "Swift version 5.9.2"

      - name: Run protocol and Agent tests
        run: swift test

      - name: Build Linux Agent
        run: swift build -c release --product toki-agent

      - name: Verify package lockfiles are unchanged
        run: git diff --exit-code -- Package.resolved

  remote-linux-hub:
    name: Linux Hub (Swift 5.9.2)
    runs-on: ubuntu-24.04
    container: swift:5.9.2-jammy
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Swift version
        run: |
          swift --version
          swift --version | grep -q "Swift version 5.9.2"

      - name: Run Hub tests
        run: swift test --package-path TokiHub

      - name: Build Linux Hub
        run: swift build --package-path TokiHub -c release --product toki-hub

      - name: Verify package lockfiles are unchanged
        run: git diff --exit-code -- TokiHub/Package.resolved
