name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tooling (XcodeGen, SwiftLint, SwiftFormat)
        run: brew install xcodegen swiftlint swiftformat

      - name: SwiftFormat
        # The pre-stack baseline predates this SwiftFormat 0.62 default rule.
        run: swiftformat . --lint --disable wrapIfStatementBodies

      - name: SwiftLint
        run: swiftlint lint --strict --quiet

      - name: Run sync foundation tests
        run: swift test

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project Toki.xcodeproj \
            -scheme Toki \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project Toki.xcodeproj \
            -scheme Toki \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  remote-linux-hub:
    name: Linux Hub (Swift 5.9.2)
    runs-on: ubuntu-24.04
    container: swift:5.9.2-jammy
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Swift version
        run: |
          swift --version
          swift --version | grep -q "Swift version 5.9.2"

      - name: Run Hub tests
        run: swift test --package-path TokiHub

      - name: Build Linux Hub
        run: swift build --package-path TokiHub -c release --product toki-hub

      - name: Verify package lockfile is unchanged
        run: git -c safe.directory="$GITHUB_WORKSPACE" -C "$GITHUB_WORKSPACE" diff --exit-code -- TokiHub/Package.resolved
