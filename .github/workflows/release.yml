name: Release

on:
  workflow_dispatch:
    inputs:
      upload_github_release:
        description: "Upload artifacts to the GitHub Release when running on a tag"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: macos-latest

    env:
      APP_NAME: Toki
      SCHEME: Toki
      PROJECT: Toki.xcodeproj
      ARCHIVE_PATH: build/Toki.xcarchive
      EXPORT_PATH: build/export
      ARTIFACT_PATH: build/artifacts
      # Optional signing/notary secrets:
      # - BUILD_CERTIFICATE_BASE64: base64-encoded Developer ID Application .p12
      # - P12_PASSWORD: password for BUILD_CERTIFICATE_BASE64
      # - KEYCHAIN_PASSWORD: temporary CI keychain password
      # - DEVELOPMENT_TEAM: Apple Developer Team ID
      # - CODE_SIGN_IDENTITY: e.g. "Developer ID Application: Example, Inc. (TEAMID)"
      # - PROVISIONING_PROFILE_BASE64: optional base64-encoded macOS provisioning profile
      # - NOTARY_APPLE_ID, NOTARY_PASSWORD, NOTARY_TEAM_ID: optional notarytool credentials
      HAS_SIGNING: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' && secrets.P12_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' && secrets.DEVELOPMENT_TEAM != '' && secrets.CODE_SIGN_IDENTITY != '' }}
      HAS_PROFILE: ${{ secrets.PROVISIONING_PROFILE_BASE64 != '' }}
      HAS_NOTARY: ${{ secrets.NOTARY_APPLE_ID != '' && secrets.NOTARY_PASSWORD != '' && secrets.NOTARY_TEAM_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          EXISTING_KEYCHAINS="$(security list-keychains -d user | sed -e 's/^[[:space:]]*"//' -e 's/"$//' | tr '\n' ' ')"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

      - name: Install provisioning profile
        if: env.HAS_SIGNING == 'true' && env.HAS_PROFILE == 'true'
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/Toki.provisionprofile"

      - name: Archive signed release
        if: env.HAS_SIGNING == 'true'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY"

      - name: Archive unsigned release
        if: env.HAS_SIGNING != 'true'
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export signed app
        if: env.HAS_SIGNING == 'true'
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          mkdir -p "$EXPORT_PATH"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>signingCertificate</key>
            <string>${CODE_SIGN_IDENTITY}</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Export unsigned app
        if: env.HAS_SIGNING != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$EXPORT_PATH"
          ditto "$ARCHIVE_PATH/Products/Applications/$APP_NAME.app" "$EXPORT_PATH/$APP_NAME.app"

      - name: Package app and dSYM
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$EXPORT_PATH/$APP_NAME.app" "$ARTIFACT_PATH/$APP_NAME-macOS.zip"

          if [ -d "$ARCHIVE_PATH/dSYMs" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$ARCHIVE_PATH/dSYMs" "$ARTIFACT_PATH/$APP_NAME-dSYMs.zip"
          fi

      - name: Submit to Apple notarization
        if: env.HAS_SIGNING == 'true' && env.HAS_NOTARY == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "$ARTIFACT_PATH/$APP_NAME-macOS.zip" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$EXPORT_PATH/$APP_NAME.app"
          xcrun stapler validate "$EXPORT_PATH/$APP_NAME.app"
          ditto -c -k --sequesterRsrc --keepParent "$EXPORT_PATH/$APP_NAME.app" "$ARTIFACT_PATH/$APP_NAME-macOS.zip"

      - name: Warn about missing notarization
        if: env.HAS_SIGNING == 'true' && env.HAS_NOTARY != 'true'
        run: |
          echo "::warning::Signed artifact $ARTIFACT_PATH/$APP_NAME-macOS.zip was built without notarization because NOTARY_APPLE_ID, NOTARY_PASSWORD, or NOTARY_TEAM_ID is missing."

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Toki-release-${{ github.ref_name }}
          path: build/artifacts/*.zip
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && (github.event_name == 'push' || inputs.upload_github_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: build/artifacts/*.zip

      - name: Clean up signing keychain
        if: always() && env.HAS_SIGNING == 'true'
        run: |
          rm -f "$RUNNER_TEMP/build_certificate.p12"
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
