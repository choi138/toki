disabled_rules:
  - nesting
  - multiple_closures_with_trailing_closure
  - function_parameter_count

opt_in_rules:
  - empty_count
  - empty_string

line_length:
  warning: 200
  error: 300
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1
    error: 1
  excluded:
    - id
    - db
    - f
    - s
    - to
    - yt

cyclomatic_complexity:
  warning: 15
  error: 20

function_body_length:
  warning: 80
  error: 120

file_length:
  warning: 600
  error: 1000

excluded:
  - DerivedData
  - .build
  - build
