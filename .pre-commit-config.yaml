repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml

  - repo: local
    hooks:
      - id: swiftlint
        name: SwiftLint
        language: system
        entry: swiftlint lint --strict
        types: [swift]
        pass_filenames: false

      - id: no-ai-coauthor
        name: Block AI co-author / Conventional Commits
        language: script
        entry: scripts/check-commit-msg.sh
        stages: [commit-msg]
